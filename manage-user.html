<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Galeri Batik Batik</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="img/logo.png" width="150px">
        </div>
        <ul>
            <li><a href="admin.html">Dashboard</a></li>
            <li><a href="manage-order.html">Manage Orders</a></li>
            <li><a href="manage-user.html">Manage Users</a></li>
        </ul>
        <div class="button" style="margin-top: 30vmax;">
            <button type="button"><a href="#" onclick="logout()">Logout</a>
        </div>
        </div>

    <div class="main-content">
        <header>
            <h1>Manage Users</h1>
        </header>
        
        <section class="manage-users">
            <h2>Registered Users</h2>
            <table id="users-table">
                <tr>
                    <th>User ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Phone Number</th>
                </tr>
                <!-- Users will be dynamically added here -->
                    <td>00001</td>
                    <td>joe nana</td>
                    <td>Joenana@gmail.co.uk</td>
                    <td>Customer</td>
                    <td>+1 556 659 892</td>
            </table>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadUsers();
        });

        function loadUsers() {
            fetch('api/get-users')  // API endpoint to get users from the server
                .then(response => response.json())
                .then(users => {
                    const usersTable = document.getElementById('users-table');
                    users.forEach(user => {
                        usersTable.innerHTML += `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.username}</td>
                                <td>${user.email}</td>
                                <td>${user.role}</td>
                                <td>
                                    <button onclick="editUser('${user.id}')">Edit</button>
                                    <button onclick="deleteUser('${user.id}')">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                })
                .catch(error => console.error('Error fetching users:', error));
        }

        function editUser(userId) {
            // Redirect to user edit page or open a modal
            window.location.href = `edit-user.html?id=${userId}`;
        }

        function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                fetch(`api/delete-user/${userId}`, { method: 'DELETE' })
                    .then(response => {
                        if (response.ok) {
                            alert('User deleted successfully.');
                            location.reload(); // Refresh the user list
                        } else {
                            alert('Failed to delete user.');
                        }
                    })
                    .catch(error => console.error('Error deleting user:', error));
            }
        }

        // Logout function
        function logout() {
            sessionStorage.removeItem("profile-username");
            window.location.href = "account.html"; // Redirect to login page
        }

    </script>
</body>
</html>
