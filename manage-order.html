<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Galeri Batik Batik</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="img/logo.png" width="150px">
        </div>
        <ul>
            <li><a href="admin.html">Dashboard</a></li>
            <li><a href="manage-order.html">Manage Orders</a></li>
            <li><a href="manage-user.html">Manage Users</a></li>
        </ul>
        <div class="button" style="margin-top: 30vmax;">
            <button type="button"><a href="#" onclick="logout()">Logout</a>
        </div>
        </div>
    <div class="main-content">
        <header>
            <h1>Manage Orders</h1>
        </header>
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Products</th>
                    <th>Total Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example row -->
                <tr>
                    <td>1001</td>
                    <td>John Doe</td>
                    <td>Product A, Product B</td>
                    <td>$120.00</td>
                    <td>Pending</td>
                    <td>
                        <button onclick="updateOrderStatus(1001, 'Shipped')">Mark as Shipped</button><br>
                        <button style="background: rgb(0, 0, 0); width: 5vmax; height: 2vmax; border-radius: 5px; color: white;" 
                        onclick="deleteOrder(1001)">Delete</button>
                    </td>
                </tr>
                <!-- Repeat rows as necessary with PHP or other server-side code -->
            </tbody>
        </table>
    </div>

    <script>
        function updateOrderStatus(orderId, status) {
            // Placeholder for AJAX call to update order status
            console.log(`Order ${orderId} status updated to ${status}`);
        }

        function deleteOrder(orderId) {
            if (confirm('Are you sure you want to delete this order?')) {
                // Placeholder for AJAX call to delete order
                console.log(`Order ${orderId} deleted`);
            }
        }

        // Logout function
        function logout() {
            sessionStorage.removeItem("profile-username");
            window.location.href = "account.html"; // Redirect to login page
        }

    </script>
</body>
</html>
